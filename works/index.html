<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lindong | Works Archive</title>
    <meta
      name="description"
      content="Archive of paintings by Lindong."
    />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("lindong-theme");
          document.documentElement.dataset.theme = savedTheme === "night" ? "night" : "day";
        } catch (error) {
          document.documentElement.dataset.theme = "day";
        }
      })();
    </script>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-base-path="../">
    <div class="page-aura" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="../" aria-label="Back to homepage">
        <span class="brand-en brand-en-hero">Lindong</span>
      </a>
      <div class="header-tools">
        <nav class="site-nav" aria-label="Main navigation">
          <a href="../">Home</a>
          <a href="./">Works</a>
          <a href="../about/">About</a>
          <a href="../about/#contact">Contact</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle day and night theme" aria-pressed="false">
          Night Mode
        </button>
      </div>
    </header>

    <main>
      <section class="page-intro section">
        <p class="eyebrow">Archive</p>
        <h1>Works</h1>
        <p class="page-intro-copy">
          An expanding archive of paintings built around displacement,
          deformation, and unstable psychic structures.
        </p>
      </section>

      <section class="section archive-section">
        <div class="archive-grid" id="archive-grid"></div>
      </section>
    </main>

    <script src="../theme.js"></script>
    <script src="../data.js"></script>
    <script src="../pages.js"></script>
  </body>
</html>
